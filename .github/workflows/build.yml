name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -c "import ast; ast.parse(open('build_patch.py', encoding='utf-8').read())"

      - name: Build patch pages
        env:
          PYTHONIOENCODING: utf-8
        run: python build_patch.py

      - name: Audit — BAT rows must use l=True
        run: |
          python - <<'PY'
          import re, sys
          src = open('build_patch.py', encoding='utf-8').read()
          hits = re.findall(r'"Base Attack Time[^"]*",\s*b\([^)]*\)', src)
          bad = [h for h in hits if 'Reduction' not in h and 'l=True' not in h]
          if bad:
              print('BAT b() missing l=True:')
              for b in bad: print(' ', b)
              sys.exit(1)
          PY

      - name: Audit — trailing whitespace inside li() text
        run: |
          python - <<'PY'
          import re, sys
          src = open('build_patch.py', encoding='utf-8').read()
          hits = re.findall(r'W\(li\("([^"]*\s)",', src)
          if hits:
              print(f'Found {len(hits)} li texts with trailing whitespace')
              for h in hits[:5]: print('  ', repr(h[-40:]))
              sys.exit(1)
          PY

      - name: Audit — per-hero ul balance
        run: |
          python - <<'PY'
          import re, sys
          src = open('build_patch.py', encoding='utf-8').read().splitlines()
          depth, last_hero, problems = 0, None, []
          for i, line in enumerate(src, 1):
              if re.search(r'W\((hero|item|unit|plain|enchant)_header\(', line):
                  if depth > 0:
                      problems.append((last_hero, f'depth={depth} at next header'))
                  depth = 0
                  m = re.search(r'_header\("([^"]+)"', line)
                  last_hero = m.group(1) if m else '?'
              if 'W(ul_open())' in line: depth += 1
              if 'W(ul_close())' in line: depth -= 1
              if depth < 0:
                  problems.append((last_hero, f'negative depth at line {i}'))
                  depth = 0
          if problems:
              for p in problems[:10]: print(' ', p)
              sys.exit(1)
          PY

      - name: Upload artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sloppy-site
          path: |
            patches/*.html
            index.html
            calendar.html
            styles.css
            scripts.js
          retention-days: 7
