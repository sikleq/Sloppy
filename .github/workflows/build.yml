name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -c "import ast; ast.parse(open('build_patch.py', encoding='utf-8').read())"

      - name: Build patch pages
        env:
          PYTHONIOENCODING: utf-8
        run: python build_patch.py

      - name: Build creeps table
        env:
          PYTHONIOENCODING: utf-8
        run: python build_creeps.py

      - name: Build mana items table
        env:
          PYTHONIOENCODING: utf-8
        run: python build_mana_items.py

      - name: Build hero dynamics matrix
        env:
          PYTHONIOENCODING: utf-8
        run: python build_heroes_dyn.py

      - name: Build item dynamics matrix
        env:
          PYTHONIOENCODING: utf-8
        run: python build_items_dyn.py

      - name: Build terrain comparison
        env:
          PYTHONIOENCODING: utf-8
        run: python build_terrain.py

      - name: Audit — BAT rows must use l=True
        run: |
          python - <<'PY'
          import re, sys
          src = open('build_patch.py', encoding='utf-8').read()
          hits = re.findall(r'"Base Attack Time[^"]*",\s*b\([^)]*\)', src)
          bad = [h for h in hits if 'Reduction' not in h and 'l=True' not in h]
          if bad:
              print('BAT b() missing l=True:')
              for b in bad: print(' ', b)
              sys.exit(1)
          PY

      - name: Audit — trailing whitespace inside li() text
        run: |
          python - <<'PY'
          import re, sys
          src = open('build_patch.py', encoding='utf-8').read()
          hits = re.findall(r'W\(li\("([^"]*\s)",', src)
          if hits:
              print(f'Found {len(hits)} li texts with trailing whitespace')
              for h in hits[:5]: print('  ', repr(h[-40:]))
              sys.exit(1)
          PY

      - name: Audit — per-hero ul balance
        run: |
          python - <<'PY'
          import re, sys
          src = open('build_patch.py', encoding='utf-8').read().splitlines()
          depth, last_hero, problems = 0, None, []
          for i, line in enumerate(src, 1):
              if re.search(r'W\((hero|item|unit|plain|enchant)_header\(', line):
                  # Only report imbalances between two headers — a ul open
                  # before the first header (General / Map Objectives /
                  # Mechanics section) is auto-closed by hero_header()'s
                  # _close_ability_block().
                  if depth > 0 and last_hero is not None:
                      problems.append((last_hero, f'depth={depth} at next header'))
                  depth = 0
                  m = re.search(r'_header\("([^"]+)"', line)
                  last_hero = m.group(1) if m else '?'
              if 'W(ul_open())' in line: depth += 1
              if 'W(ul_close())' in line: depth -= 1
              if depth < 0:
                  problems.append((last_hero, f'negative depth at line {i}'))
                  depth = 0
          if problems:
              for p in problems[:10]: print(' ', p)
              sys.exit(1)
          PY

      - name: Stage site for Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp index.html _site/
          cp calendar.html _site/
          cp neutral_creeps.html _site/
          cp creeps.html _site/
          cp materials.html _site/
          cp mana_items.html _site/
          cp unit_abilities.html _site/
          cp neutral_abilities.html _site/
          cp heroes_dyn.html _site/
          cp items_dyn.html _site/
          cp terrain.html _site/
          cp styles.css _site/
          cp scripts.js _site/
          cp _dynamics.json _site/
          cp -r patches _site/
          cp -r icons _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
