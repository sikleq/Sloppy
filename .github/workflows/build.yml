name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest rcssmin rjsmin

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Build site
        env:
          PYTHONIOENCODING: utf-8
        run: python build_site.py

      - name: Verify minification
        run: |
          python - <<'PY'
          import pathlib, sys
          src_css = pathlib.Path('styles.css').stat().st_size
          dist_css = pathlib.Path('dist/styles.css').stat().st_size
          src_js = pathlib.Path('src/scripts.js').stat().st_size
          dist_js = pathlib.Path('dist/src/scripts.js').stat().st_size
          ok = True
          if dist_css >= src_css:
              print(f'FAIL: dist/styles.css ({dist_css}) not smaller than source ({src_css})')
              ok = False
          if dist_js >= src_js:
              print(f'FAIL: dist/src/scripts.js ({dist_js}) not smaller than source ({src_js})')
              ok = False
          if ok:
              print(f'OK — CSS {src_css}→{dist_css}, JS {src_js}→{dist_js}')
          else:
              sys.exit(1)
          PY

      - name: Validate normalized patch data
        run: python tools/validate_data.py

      - name: Audit — content/*.py tag direction
        run: |
          python - <<'PY'
          """Scan content/*.py for b(old,new) where direction word contradicts badge."""
          import re, sys, pathlib

          # b(old, new) where old < new = increase, old > new = decrease
          B_RE = re.compile(
              r'b\(\s*([\d.]+)\s*,\s*([\d.]+)'
              r'(?:\s*,\s*l\s*=\s*(True|False))?\s*\)'
          )
          INCREASED_RE = re.compile(r'\b(increased|raised)\b', re.I)
          DECREASED_RE = re.compile(r'\b(decreased|lowered)\b', re.I)

          issues = []
          for p in sorted(pathlib.Path('content').glob('*.py')):
              for i, line in enumerate(p.read_text(encoding='utf-8').splitlines(), 1):
                  m = B_RE.search(line)
                  if not m:
                      continue
                  old, new = float(m.group(1)), float(m.group(2))
                  l_true = m.group(3) == 'True'
                  if old == new:
                      continue
                  went_up = new > old
                  has_inc = INCREASED_RE.search(line)
                  has_dec = DECREASED_RE.search(line)
                  if has_inc and has_dec:
                      continue
                  # Word "increased" means value went up. With l=True that's
                  # a nerf (higher cost=worse); without l=True that's a buff.
                  # Contradiction: word says up but values went down, or vice versa.
                  if has_inc and not went_up:
                      issues.append(f'{p.name}:{i}: "increased" but old > new: {line.strip()[:120]}')
                  if has_dec and went_up:
                      issues.append(f'{p.name}:{i}: "decreased" but new > old: {line.strip()[:120]}')

          if issues:
              print(f'Found {len(issues)} direction contradiction(s):')
              for iss in issues[:20]:
                  print(f'  {iss}')
              sys.exit(1)
          print(f'OK — no direction contradictions in content/*.py')
          PY

      - name: Audit — BAT rows must use l=True
        run: |
          python - <<'PY'
          import re, sys, pathlib
          src = '\n'.join(p.read_text(encoding='utf-8')
                         for p in pathlib.Path('content').glob('*.py'))
          hits = re.findall(r'"Base Attack Time[^"]*",\s*b\([^)]*\)', src)
          bad = [h for h in hits if 'Reduction' not in h and 'l=True' not in h]
          if bad:
              print('BAT b() missing l=True:')
              for b in bad: print(' ', b)
              sys.exit(1)
          PY

      - name: Audit — trailing whitespace inside li() text
        run: |
          python - <<'PY'
          import re, sys, pathlib
          src = '\n'.join(p.read_text(encoding='utf-8')
                         for p in pathlib.Path('content').glob('*.py'))
          hits = re.findall(r'W\(li\("([^"]*\s)",', src)
          if hits:
              print(f'Found {len(hits)} li texts with trailing whitespace')
              for h in hits[:5]: print('  ', repr(h[-40:]))
              sys.exit(1)
          PY

      - name: Audit — per-hero ul balance
        run: |
          python - <<'PY'
          import re, sys, pathlib
          lines = []
          for p in sorted(pathlib.Path('content').glob('*.py')):
              lines.extend(p.read_text(encoding='utf-8').splitlines())
          depth, last_hero, problems = 0, None, []
          for i, line in enumerate(lines, 1):
              if re.search(r'W\((hero|item|unit|plain|enchant)_header\(', line):
                  if depth > 0 and last_hero is not None:
                      problems.append((last_hero, f'depth={depth} at next header'))
                  depth = 0
                  m = re.search(r'_header\("([^"]+)"', line)
                  last_hero = m.group(1) if m else '?'
              if 'W(ul_open())' in line: depth += 1
              if 'W(ul_close())' in line: depth -= 1
              if depth < 0:
                  problems.append((last_hero, f'negative depth at line {i}'))
                  depth = 0
          if problems:
              for p in problems[:10]: print(' ', p)
              sys.exit(1)
          PY

      - name: Audit — latest patch coverage across all categories
        run: |
          python - <<'PY'
          import sys, pathlib, re

          sys.path.insert(0, '.')
          from patch.meta import latest_stats_version, _current_version
          from builders.build_patches import _stem_to_version, _STEM_RE

          ver = _current_version()
          stats_ver = latest_stats_version()
          problems = []

          # 1. content/p*.py exists for latest version
          stem_map = {}
          for p in pathlib.Path('content').glob('p*.py'):
              v = _stem_to_version(p.stem)
              if v:
                  stem_map[v] = p
          if ver not in stem_map:
              problems.append(f'Missing content/p*.py for latest patch {ver}')

          # 2. data/stats/<ver>/ must EXACTLY match the current patch — no
          # silent fallback to an older stats dir. Required: every JSON+TXT
          # input that builders/audits consume for hero stats, neutral
          # abilities, and hero ability metadata.
          if stats_ver != ver:
              problems.append(
                  f'Stats binding mismatch: current patch is {ver} but '
                  f'latest_stats_version() resolved to {stats_ver}. '
                  f'Create data/stats/{ver}/ with the full file set or '
                  f'remove the partial dir.')
          stats_dir = pathlib.Path('data/stats') / ver
          required = (
              'items.txt', 'items.json',
              'units.json',
              'npc_units.txt', 'npc_units.json',
              'npc_abilities.txt', 'npc_abilities.json',
              'npc_heroes.txt',
              'heroes.json', 'heroes_raw.json',
              'abilities.json', 'ability_ids.json',
          )
          for fn in required:
              if not (stats_dir / fn).exists():
                  problems.append(f'Missing data/stats/{ver}/{fn}')

          # 2b. Per-hero KV dir — AoE Increase + Hero Stats walk this
          # directory; a missing or sparse heroes/ silently degrades
          # those tables. Authoritative hero list is heroes.json; the
          # heroes/ dir must have a KV file for every entry there (a
          # raw file count would miss a specific hero while passing on
          # an extra unrelated file).
          import json as _j
          heroes_dir = stats_dir / 'heroes'
          if not heroes_dir.is_dir():
              problems.append(f'Missing data/stats/{ver}/heroes/ directory')
          elif (stats_dir / 'heroes.json').exists():
              hjson = _j.loads((stats_dir / 'heroes.json').read_text(encoding='utf-8'))
              expected = {k for k in hjson
                          if k.startswith('npc_dota_hero_') and k != 'npc_dota_hero_base'}
              present = {p.stem for p in heroes_dir.glob('npc_dota_hero_*.txt')}
              missing_kv = sorted(expected - present)
              if missing_kv:
                  problems.append(
                      f'data/stats/{ver}/heroes/ missing {len(missing_kv)} '
                      f'hero KV file(s) listed in heroes.json: '
                      f'{missing_kv[:5]}{"..." if len(missing_kv) > 5 else ""}')

          # 2a. Normalized JSON artifact must exist for the current patch
          norm_path = pathlib.Path('data/normalized/patches') / f'{ver}.json'
          if not norm_path.exists():
              problems.append(
                  f'Missing {norm_path} — regenerate via '
                  f'generate_patch_code_v2.py for patch {ver}.')

          # 3. RELEASE_HISTORY entry has filename (patch page will be built)
          from patch.meta import RELEASE_HISTORY
          entry = next((p for p in RELEASE_HISTORY if p['version'] == ver), None)
          if not entry or 'filename' not in entry:
              problems.append(f'RELEASE_HISTORY entry for {ver} has no "filename"')

          if problems:
              print(f'Latest patch coverage FAILED for {ver}:')
              for p in problems:
                  print(f'  - {p}')
              sys.exit(1)
          print(f'OK — latest patch {ver} covered in all categories (stats={stats_ver})')
          PY

      - name: Audit — local ability icon coverage
        run: python scripts/audit/check_icons.py

      - name: Copy static assets into dist
        if: github.ref == 'refs/heads/main'
        run: |
          cp _dynamics.json dist/
          cp -r icons dist/

      - name: Stage site for Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp -r dist/. _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
